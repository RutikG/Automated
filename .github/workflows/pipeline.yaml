name: Push Pipeline
on: 
  repository_dispatch:
    types: [repo-a-changed]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Download repository
        uses: actions/checkout@v4
        with:
          path: e-2-e-app

      - name: Create Docker File and Build Docker Image
        working-directory: e-2-e-app
        run: |
          echo "FROM node" > Dockerfile
          echo "WORKDIR /app" >> Dockerfile
          echo "COPY ./app/. ." >> Dockerfile
          echo "RUN npm install" >> Dockerfile
          echo "EXPOSE 3000" >> Dockerfile
          echo "CMD [\"npm\", \"start\"]" >> Dockerfile
          docker build -t ${{ secrets.DOCKER_USERNAME }}/forfun:${{ github.event.client_payload.sha }} --platform=linux/amd64 .

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/forfun:${{ github.event.client_payload.sha }}

      - name: Trigger Remote Workflow
        if: success()
        uses: peter-evans/workflow-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_MAN_TOKEN }}
          repository: Manifest
          event-type: deploy
          client-payload: |
            {
              "sha": "${{ github.event.client_payload.sha }}",
              "image": "${{ secrets.DOCKER_USERNAME }}/forfun:${{ github.event.client_payload.sha }}"
            }